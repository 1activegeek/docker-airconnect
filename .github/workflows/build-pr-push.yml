name: PR Build Push

on:
  workflow_run:
    workflows: ["PR Build Validate"]
    types:
      - completed

jobs:
  build-push:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    environment: dockerhub-test

    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              core.setFailed('No pull requests found in workflow_run event');
              return;
            }
            const pr = prs[0];
            core.setOutput('number', pr.number);
            core.setOutput('head_sha', context.payload.workflow_run.head_sha);
            core.info(`PR #${pr.number} @ ${context.payload.workflow_run.head_sha}`);

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Setup qemu
        uses: docker/setup-qemu-action@v3

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare tags
        id: prepare
        run: |
          DOCKER_IMAGE=1activegeek/airconnect
          VERSION=$(curl -s https://api.github.com/repos/philippe44/AirConnect/releases/latest | grep tag_name | cut -d '"' -f 4)
          PR_NUM=${{ steps.pr.outputs.number }}
          echo "docker_image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "buildx_args=--platform linux/amd64,linux/arm64 \
            --tag ${DOCKER_IMAGE}:pr-${PR_NUM}-${VERSION} \
            --tag ${DOCKER_IMAGE}:pr-${PR_NUM} \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${{ steps.pr.outputs.head_sha }} \
            --file ./Dockerfile ./" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push
        run: |
          docker buildx build --output "type=image,push=true" ${{ steps.prepare.outputs.buildx_args }}

      - name: Inspect Image
        run: |
          docker buildx imagetools inspect ${{ steps.prepare.outputs.docker_image }}:pr-${{ steps.pr.outputs.number }}
